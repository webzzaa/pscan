name: 魔改版构建发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      snapshot:
        description: '仅测试构建（不发布）'
        type: boolean
        default: false
      draft:
        description: '创建草稿发布'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 构建和发布
        uses: ./.github/actions/build-release
        with:
          mode: ${{ inputs.snapshot && 'snapshot' || 'release' }}
          go-version: '1.26'
          retention-days: '90'

      - name: 创建 Release 并上传
        uses: softprops/action-gh-release@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') && !inputs.snapshot }}
        with:
          files: |
            pscan.exe
            pscan-nolocal.exe
          draft: ${{ inputs.draft }}
          generate_release_notes: true
